name: Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # PRs verificam se o app compila e se os testes do ciclo de vida de regras do daemon + parser telnet passam.
  pr-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Verificação de sintaxe do daemon
        run: sh -n app/src/main/assets/starhouter.sh

      - name: Testes de ciclo de vida de regras (sem regras fantasma)
        run: sh scripts/test/rule_lifecycle_test.sh app/src/main/assets/starhouter.sh

      - name: Testes do parser telnet
        run: |
          mkdir -p /tmp/tout
          javac -d /tmp/tout \
            app/src/main/java/com/castilhoduarte/starhouter/TelnetRoot.java \
            scripts/test/TelnetRootTest.java
          java -cp /tmp/tout com.castilhoduarte.starhouter.TelnetRootTest

      - name: Conceder permissão de execução ao gradlew
        run: chmod +x gradlew

      - name: Compilar (debug)
        run: ./gradlew assembleDebug --stacktrace

  # Merges na main executam os mesmos testes e depois produzem um APK de release assinado.
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Verificação de sintaxe do daemon
        run: sh -n app/src/main/assets/starhouter.sh

      - name: Testes de ciclo de vida de regras (sem regras fantasma)
        run: sh scripts/test/rule_lifecycle_test.sh app/src/main/assets/starhouter.sh

      - name: Testes do parser telnet
        run: |
          mkdir -p /tmp/tout
          javac -d /tmp/tout \
            app/src/main/java/com/castilhoduarte/starhouter/TelnetRoot.java \
            scripts/test/TelnetRootTest.java
          java -cp /tmp/tout com.castilhoduarte.starhouter.TelnetRootTest

      - name: Decodificar keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Calcular versão
        id: ver
        run: |
          VC="${GITHUB_RUN_NUMBER}"
          VN="1.0.${GITHUB_RUN_NUMBER}"
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "name=$VN" >> "$GITHUB_OUTPUT"

      - name: Gravar versão no build.gradle.kts
        run: |
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.ver.outputs.name }}\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ steps.ver.outputs.code }}/" app/build.gradle.kts

      - name: Conceder permissão de execução ao gradlew
        run: chmod +x gradlew

      - name: Gerar release assinado
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Criar release e enviar APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.name }}"
          gh release create "$TAG" \
            --title "StarHouter ${{ steps.ver.outputs.name }}" \
            --notes "Release automatizado"
          gh release upload "$TAG" \
            app/build/outputs/apk/release/app-release.apk
